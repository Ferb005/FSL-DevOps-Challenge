name: CD Pipeline

on:
  push:
    branches:
      - devel
      - stage

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '15'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run tests
        env:
          CI: true
        run: npm run test

      - name: Build project
        run: npm run build

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Restore Terraform state
        uses: actions/cache/restore@v4
        id: tfstate-cache
        with:
          path: terraform/terraform.tfstate
          key: tfstate-${{ github.ref_name }}-v1

      - name: Initialize Terraform
        working-directory: terraform
        run: terraform init

      - name: Import existing resources
        if: steps.tfstate-cache.outputs.cache-hit != 'true'
        working-directory: terraform
        continue-on-error: true
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
        run: |
          ENV="${{ github.ref_name }}"
          SUB="${ARM_SUBSCRIPTION_ID}"
          RG_NAME="rg-rdicidr-${ENV}"
          SA_NAME="rdicidr${ENV}"
          LAW_NAME="law-rdicidr-${ENV}"

          terraform import -var-file="${ENV}.tfvars" azurerm_resource_group.main \
            "/subscriptions/${SUB}/resourceGroups/${RG_NAME}" || true
          terraform import -var-file="${ENV}.tfvars" azurerm_storage_account.web \
            "/subscriptions/${SUB}/resourceGroups/${RG_NAME}/providers/Microsoft.Storage/storageAccounts/${SA_NAME}" || true
          terraform import -var-file="${ENV}.tfvars" azurerm_log_analytics_workspace.main \
            "/subscriptions/${SUB}/resourceGroups/${RG_NAME}/providers/Microsoft.OperationalInsights/workspaces/${LAW_NAME}" || true

      - name: Apply Terraform
        working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
        run: terraform apply -auto-approve -var-file="${{ github.ref_name }}.tfvars"

      - name: Get Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          echo "storage_account_name=$(terraform output -raw storage_account_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

      - name: Upload to Azure Storage
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --source ./build \
              --destination '$web' \
              --overwrite \
              --account-name "${{ steps.tf.outputs.storage_account_name }}" \
              --auth-mode login

      - name: Save Terraform state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: terraform/terraform.tfstate
          key: tfstate-${{ github.ref_name }}-v1
