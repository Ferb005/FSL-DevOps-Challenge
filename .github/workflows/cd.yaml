name: CD Pipeline

on:
  push:
    branches:
      - devel
      - stage
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    env:
      ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
      ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
      ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
      ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
      ENV: ${{ github.ref_name }}
      RESOURCE_PREFIX: rdicidr-${{ github.ref_name }}
      RESOURCE_GROUP: rg-rdicidr-${{ github.ref_name }}
      STORAGE_ACCOUNT: rdicidr${{ github.ref_name }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '15'
          cache: 'npm'

      - name: Cache node modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Build project
        run: npm run build

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Cache Terraform providers
        uses: actions/cache@v4
        id: terraform-cache
        with:
          path: terraform/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Terraform state container exists
        run: |
          az storage container create \
            --name tfstate \
            --account-name "$STORAGE_ACCOUNT" \
            --auth-mode login || true

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${STORAGE_ACCOUNT}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=rdicidr-${ENV}.tfstate"

      - name: Import existing Azure resources
        working-directory: terraform
        run: bash import-existing.sh "$ENV"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -var-file="${ENV}.tfvars"

      - name: Get Terraform outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "storage_account=$(terraform output -raw storage_account_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(terraform output -raw resource_group_name)" >> "$GITHUB_OUTPUT"
          echo "cdn_url=$(terraform output -raw cdn_endpoint_url)" >> "$GITHUB_OUTPUT"
          echo "frontdoor_profile=$(terraform output -raw frontdoor_profile_name)" >> "$GITHUB_OUTPUT"
          echo "frontdoor_endpoint=$(terraform output -raw frontdoor_endpoint_name)" >> "$GITHUB_OUTPUT"

      - name: Deploy static site to Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name "${{ steps.tf-outputs.outputs.storage_account }}" \
            --auth-mode login \
            --destination '$web' \
            --source build \
            --overwrite

      - name: Purge Front Door cache
        run: |
          az afd endpoint purge \
            --resource-group "${{ steps.tf-outputs.outputs.resource_group }}" \
            --profile-name "${{ steps.tf-outputs.outputs.frontdoor_profile }}" \
            --endpoint-name "${{ steps.tf-outputs.outputs.frontdoor_endpoint }}" \
            --content-paths "/*"

      - name: Deployment summary
        run: |
          echo "Environment: $ENV"
          echo "Storage account: ${{ steps.tf-outputs.outputs.storage_account }}"
          echo "CDN URL: ${{ steps.tf-outputs.outputs.cdn_url }}"
